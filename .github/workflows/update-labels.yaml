name: Update Labels

on:
  workflow_run:
    workflows: ["Staging Lint Checks"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  update-labels:
    name: Update Labels

    runs-on: ubuntu-24.04

    steps:
      # Uses the .github folder from the repo default branch (workflow_run trigger runs in the
      # context of the base branch, not the PR branch, so this is safe even for fork PRs).
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github

      - name: Install runtime deps
        run: npm ci --omit dev
        working-directory: .github

      - name: Update Labels
        uses: actions/github-script@v8
        with:
          script: |
            const { default: updateLabels } =
              await import('${{ github.workspace }}/.github/workflows/src/update-labels.js');
            await updateLabels({ github, context, core });
